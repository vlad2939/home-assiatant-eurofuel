<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EuroFuel Compare - Prețuri Benzina & Motorina Europa</title>
    
    <!-- Favicons -->
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32x32.png">
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-theme="light">

    <div class="app-container">
        
        <!-- Header -->
        <header class="app-header">
            <div class="logo-area">
                <div class="logo-icon-wrapper">
                    <img src="img/logo.png" alt="EuroFuel Logo" class="logo-img">
                </div>
                <div class="logo-text">
                    <h1 class="brand-title">EUROFUEL COMPARE</h1>
                    <p class="brand-subtitle" id="brand-subtitle">COMPARATOR PREȚURI BENZINĂ - EUROPA</p>
                </div>
            </div>
            
            <div class="header-controls">
                <!-- Date Pill -->
                <div class="date-pill">
                    <span class="status-dot"></span>
                    <span id="date-label">Date: ...</span>
                </div>
                
                <!-- Refresh Button -->
                <button id="refresh-data-btn" class="round-btn" title="Reîmprospătează datele">
                    <i class="fas fa-sync-alt"></i>
                </button>
                
                <!-- Theme Toggle Button -->
                <button id="theme-toggle-btn" class="round-btn" title="Comută tema Light/Dark">
                    <i class="fas fa-moon" id="theme-btn-icon"></i>
                </button>
            </div>
        </header>

        <!-- Main Title & Fuel Selection -->
        <section class="title-section">
            <div class="title-left">
                <h2 class="section-title">SELECTEAZĂ ȚĂRILE PENTRU COMPARAȚIE</h2>
                <p class="section-subtitle" id="section-subtitle">
                    Alege până la 4 țări din Europa continentală pentru a compara prețurile la benzină Euro 95
                </p>
            </div>
            
            <div class="title-right">
                <!-- 2 Identical buttons for Fuel Select on the same line -->
                <div class="fuel-buttons-container">
                    <button id="fuel-petrol-btn" class="fuel-btn active">
                        <span class="fuel-btn-dot petrol-dot"></span> Benzină Euro 95
                    </button>
                    <button id="fuel-diesel-btn" class="fuel-btn">
                        <span class="fuel-btn-dot diesel-dot"></span> Motorină
                    </button>
                </div>
            </div>
        </section>

        <!-- Comparison Grid -->
        <!-- In the screenshot, the country selectors (ȚARA 1-4) are aligned directly above the columns. -->
        <main class="comparison-grid" id="comparison-grid-container">
            
            <!-- Column 1 -->
            <div class="grid-column-wrapper">
                <div class="selector-group">
                    <label class="selector-label">ȚARA 1</label>
                    <select id="country-select-1" class="filter-control"></select>
                </div>
                <div id="country-card-1" class="country-card-placeholder"></div>
            </div>
            
            <!-- Column 2 -->
            <div class="grid-column-wrapper">
                <div class="selector-group">
                    <label class="selector-label">ȚARA 2</label>
                    <select id="country-select-2" class="filter-control"></select>
                </div>
                <div id="country-card-2" class="country-card-placeholder"></div>
            </div>
            
            <!-- Column 3 -->
            <div class="grid-column-wrapper">
                <div class="selector-group">
                    <label class="selector-label">ȚARA 3</label>
                    <select id="country-select-3" class="filter-control"></select>
                </div>
                <div id="country-card-3" class="country-card-placeholder"></div>
            </div>
            
            <!-- Column 4 -->
            <div class="grid-column-wrapper">
                <div class="selector-group">
                    <label class="selector-label">ȚARA 4</label>
                    <select id="country-select-4" class="filter-control"></select>
                </div>
                <div id="country-card-4" class="country-card-placeholder"></div>
            </div>
            
        </main>

        <!-- Metadata & Exchange Rates Info Bar -->
        <section id="info-bar-container"></section>

        <!-- Footer -->
        <footer class="app-footer">
            <div class="footer-left" id="author-popup-trigger">
                @ concept si realizare vlad39
            </div>
            <div class="footer-right">
                Surse date: BNR, peco-online.ro, fuelo.eu
            </div>
        </footer>

    </div>

    <!-- Readme Modal Overlay -->
    <div id="readme-modal-overlay" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <h3><i class="fas fa-book-open"></i> Documentație EuroFuel</h3>
                <button id="modal-close-btn" class="modal-close-btn" aria-label="Închide modalul">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="readme-modal-body" class="modal-body">
                <!-- README content loaded dynamically -->
            </div>
        </div>
    </div>

    <!-- Application Script -->
    <script src="js/app.js"></script>
</body>
</html>
